<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #cccccc; margin: 0; padding: 20px; text-align: center; }
        .logo { width: 100px; margin-bottom: 20px; }
        .links a { display: block; margin-top: 10px; color: blue; text-decoration: none; }
    </style>
</head>
<body>
    <!-- SVG Logo to represent the image's logo -->
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="60" height="60" fill="#0066cc" />
        <rect x="30" y="30" width="40" height="40" fill="white" />
        <circle cx="50" cy="50" r="10" fill="#0066cc" />
    </svg>
    <div class="links">
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
        <a href="#">Link 3</a>
    </div>
</body>
</html>
