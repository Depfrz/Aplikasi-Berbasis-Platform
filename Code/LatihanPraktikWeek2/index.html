<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Penjualan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Form Pemesanan Barang</h1>
        <div class="form-group">
            <label for="kode-barang">Kode Barang:</label>
            <input type="text" id="kode-barang">
            <button id="cari-btn">Cari</button>
        </div>
        <div class="form-group">
            <label for="nama-barang">Nama Barang:</label>
            <input type="text" id="nama-barang" disabled>
        </div>
        <div class="form-group">
            <label for="harga-barang">Harga Barang:</label>
            <input type="text" id="harga-barang" disabled>
        </div>
        <div class="form-group">
            <label for="jumlah-barang">Jumlah Barang:</label>
            <input type="number" id="jumlah-barang" min="1">
            <button id="hitung-btn">Hitung</button>
        </div>
        <div class="result-group">
            <h2>Hasil Perhitungan</h2>
            <p>Total Harga: <span id="total-harga"></span></p>
            <p>Diskon: <span id="diskon"></span></p>
            <p>Total Bayar: <span id="total-bayar"></span></p>
        </div>
        <button id="cetak-btn">Cetak</button>
        <div id="error-message" class="error"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
